# Default-device wrapper. Flashes the original `ha-voice-openai`
# speaker. Compile this with `just flash` or `poetry run esphome run
# voice_pe_config.yaml`.
#
# For additional speakers, copy voice_pe_example.yaml to
# voice_pe_<name>.yaml and edit. See AGENTS.md / the
# home-assistant-voice-pe README for the multi-device pattern.
#
# Structure (why the file is small):
#   voice_pe_base.yaml              — all the firmware logic (1200 lines).
#                                     No api.encryption.key, no
#                                     external_components.
#   voice_pe_components_local.yaml  — external_components, type:local
#                                     for the custom voice_assistant_
#                                     websocket component. Picks up
#                                     uncommitted .cpp/.h changes
#                                     immediately. Used by this
#                                     wrapper (the daily dev loop).
#   voice_pe_components_git.yaml    — external_components, type:git
#                                     for ESPHome instances without
#                                     this repo cloned (HA dashboard).
#                                     NOT used here.

packages:
  base: !include voice_pe_base.yaml
  components: !include voice_pe_components_local.yaml

substitutions:
  device_name: ha-voice-openai

api:
  encryption:
    key: !secret api_encryption_key
