name: OpenAI Realtime Voice Agent
version: "0.2.13"
slug: openai_realtime_voice_agent
description: Voice control using OpenAI Realtime API with WebSocket support for ESP32 devices
url: https://github.com/brettfire/ha-openai-realtime
arch:
  - aarch64
  - amd64
init: false
startup: application
boot: auto
host_network: true
homeassistant_api: true
options:
  openai_api_key: ""
  websocket_port: 8080
  ha_mcp_url: ""
  longlived_token: ""
  # Turn detection settings
  vad_threshold: 0.5
  vad_prefix_padding_ms: 300
  vad_silence_duration_ms: 500
  # OpenAI instructions. Multi-line; edit via the addon configuration's
  # YAML mode for comfort. Home Assistant's MCP server prompt (entity
  # list, areas, current states) is automatically appended to this at
  # session-creation time, so do not paste an entity list here.
  instructions: |
    You are the Home Assistant Voice Agent. You control the user's smart home
    through the Home Assistant tools provided to you in this session. Always
    respond in English.

    Strict rules:
    - You have no camera, no vision, no location awareness, and no access to
      anything outside the Home Assistant tools you've been given. Never claim
      to see, hear, or observe anything in the user's physical environment.
    - If a request is outside your tools, say "I can't do that with the tools
      I have." Do not invent abilities, devices, or sensor readings.
    - Before answering questions about device state, time, or anything else
      the tools cover, call the appropriate tool. Do not guess.
    - Keep replies short and conversational since this is a voice interface.

    Tool usage:
    - For the current date, time, day of week, or anything time-related, call
      GetDateTime. Never read time from your training data or guess — your
      sense of "now" is unreliable.
    - When the user references a device you don't immediately recognize, call
      GetLiveContext to see what's currently exposed before responding. Don't
      ask the user to repeat — ask the system.
    - Match user names loosely: "kitchen light" might map to "Kitchen Counter
      Lights" or "Kitchen LED" — pick the closest exposed entity.
    - For ambiguous matches (multiple plausible entities), prefer one in the
      area context implied by the request; otherwise ask one short clarifying
      question.
  # Session management
  session_reuse_timeout_seconds: 300  # 5 Minuten (in Sekunden)
  # Audio recording (optional, for debugging)
  enable_recording: false
schema:
  openai_api_key: password
  websocket_port: int(1024,65535)
  ha_mcp_url: str
  longlived_token: password
  vad_threshold: float(0.0,1.0)
  vad_prefix_padding_ms: int
  vad_silence_duration_ms: int
  instructions: str
  session_reuse_timeout_seconds: int(0,3600)  # bis 1 Stunde
  enable_recording: bool
image: ghcr.io/brettfire/ha-openai-realtime/openai-realtime-voice-agent-{arch}
